key: kling-2.6-t2v
label: Kling 2.6 Text to Video
family: market
provider_model: kling-2.6/text-to-video
task_modes:
  - text_to_video
inputs:
  image:
    required_min: 0
    required_max: 0
  video:
    required_min: 0
    required_max: 0
  audio:
    required_min: 0
    required_max: 0
options:
  sound:
    type: bool
    default: null
    required: true
  aspect_ratio:
    type: enum
    allowed: ['1:1', '16:9', '9:16']
    default: null
    required: true
  duration:
    type: enum
    allowed: [5, 10]
    default: null
    required: true
prompt:
  required: true
  max_chars: 2500
  enhancement_supported: true
  enhancement_default_policy: ask
  default_profile_key: kling_video_v1
defaults: {}
transport:
  endpoint_family: market
  create_path: /api/v1/jobs/createTask
  status_path: /api/v1/jobs/recordInfo
  callback_supported: true
verification:
  verified_from:
    - live_page_model_surface
    - docs_kie_secondary
  verified_on: '2026-03-25'
  verification_notes:
