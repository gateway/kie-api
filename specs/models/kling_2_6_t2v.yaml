    - The live page exposes prompt, sound, aspect_ratio, and duration as the expected fields for text-to-video.
    - The live page shows aspect_ratio choices 1:1, 16:9, and 9:16, and duration choices 5 or 10 seconds.
    - Provider model string remains verified from docs.kie.ai because the live page did not expose the underlying JSON request example directly in this pass.
