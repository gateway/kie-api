key: kling-3.0-t2v
label: Kling 3.0 Text to Video
family: market
provider_model: kling-3.0/video
task_modes:
  - text_to_video
inputs:
  image:
    required_min: 0
    required_max: 0
  video:
    required_min: 0
    required_max: 0
  audio:
    required_min: 0
    required_max: 0
options:
  mode:
    type: enum
    allowed: [std, pro]
    default: std
    required: true
  sound:
    type: bool
    default: true
    notes: "Live page shows sound enabled in the UI by default. Kling 3.0 image-to-video rejected an omitted sound value on 2026-03-26, so the SDK aligns the text-to-video path to the same wrapper-safe default unless the caller explicitly sets false."
  duration:
    type: int_range
    min: 3
    max: 15
    default: null
    required: true
  aspect_ratio:
    type: enum
    allowed: ['1:1', '9:16', '16:9']
    default: null
  multi_shots:
    type: bool
    default: false
prompt:
  required: true
  max_chars: 2500
  enhancement_supported: true
  enhancement_default_policy: ask
  default_profile_key: kling_3_0_t2v_v1
defaults: {}
transport:
  endpoint_family: market
  create_path: /api/v1/jobs/createTask
  status_path: /api/v1/jobs/recordInfo
  callback_supported: true
verification:
  verified_from:
    - live_page_api_surface
    - docs_kie_secondary
  verified_on: '2026-03-25'
  verification_notes:
    - Verified from the live https://kie.ai/kling-3-0 page API surface.
    - The live page shows prompt, duration, mode, sound, multi_shots, and aspect_ratio for the base video form.
    - The live page supports up to 15 seconds and marks aspect_ratio choices as 1:1, 9:16, and 16:9.
    - The live page help text states std has standard resolution and pro has higher resolution.
    - The live page marks prompt as required and shows sound toggled on.
    - Kling 3.0 image-to-video rejected an omitted sound value on 2026-03-26, so the SDK defaults sound=true for the shared Kling 3.0 video family unless the caller explicitly sets false.
    - The SDK defaults mode to std and multi_shots to false, but those default values are SDK choices and not yet confirmed as provider defaults.
  field_provenance:
    key: inferred
    label: inferred
    family: inferred
    provider_model: verified_docs
    task_modes: inferred
    inputs.image.required_min: inferred
    inputs.image.required_max: inferred
