key: kling-3.0-i2v
label: Kling 3.0 Image to Video
family: market
provider_model: kling-3.0/video
task_modes:
  - image_to_video
inputs:
  image:
    required_min: 1
    required_max: 2
  video:
    required_min: 0
    required_max: 0
  audio:
    required_min: 0
    required_max: 0
input_constraints:
  image_formats: [jpeg, jpg, png]
  image_max_mb: 10
options:
  mode:
    type: enum
    allowed: [std, pro]
    default: std
    required: true
  sound:
    type: bool
    default: true
    notes: "Live page shows sound enabled in the UI by default. A real submit without sound on 2026-03-26 failed with 'sound cannot be empty', so the SDK now defaults Kling 3.0 sound to true unless the caller explicitly sets false."
  duration:
    type: int_range
    min: 3
    max: 15
    default: null
    required: true
  aspect_ratio:
    type: enum
    allowed: ['1:1', '9:16', '16:9']
    default: null
    allow_infer_from_media: true
  multi_shots:
    type: bool
    default: false
prompt:
  required: true
  max_chars: 2500
  enhancement_supported: true
  enhancement_default_policy: ask
  default_profile_keys_by_input_pattern:
    single_image: kling_3_0_i2v_first_frame_v1
    first_last_frames: kling_3_0_i2v_first_last_frame_v1
defaults: {}
transport:
  endpoint_family: market
  create_path: /api/v1/jobs/createTask
  status_path: /api/v1/jobs/recordInfo
  callback_supported: true
verification:
  verified_from:
    - live_page_api_surface
    - docs_kie_secondary
  verified_on: '2026-03-25'
  verification_notes:
    - Verified from the live https://kie.ai/kling-3-0 page API surface.
    - The live page exposes start and end frame image inputs with JPG and PNG support up to 10MB.
    - The live page states aspect_ratio is invalid if first or last frame images are provided, so the SDK treats aspect_ratio as optional and inferable from media.
    - The live page help text states std has standard resolution and pro has higher resolution.
    - The live page marks prompt as required and shows sound toggled on.
    - A real Kling 3.0 image-to-video submit on 2026-03-26 failed with 'sound cannot be empty' when sound was omitted, so the SDK defaults sound=true for wrapper-safe behavior.
    - The SDK defaults mode to std and multi_shots to false, but those default values are SDK choices and not yet confirmed as provider defaults.
    - The live page and docs both use provider model kling-3.0/video for both text-to-video and image-to-video.
  field_provenance:
    key: inferred
    label: inferred
    family: inferred
    provider_model: verified_docs
    task_modes: inferred
    inputs.image.required_min: verified_live
    inputs.image.required_max: verified_live
    inputs.video.required_min: inferred
    inputs.video.required_max: inferred
    inputs.audio.required_min: inferred
    inputs.audio.required_max: inferred
    input_constraints.image_formats: verified_live
    input_constraints.image_max_mb: verified_live
    options.mode.type: inferred
    options.mode.allowed: verified_live
    options.mode.default: inferred
    options.mode.required: verified_live
    options.sound.type: inferred
    options.sound.default: verified_live
    options.sound.notes: verified_live
    options.duration.type: inferred
    options.duration.min: verified_live
    options.duration.max: verified_live
    options.duration.default: unknown
    options.duration.required: verified_live
    options.aspect_ratio.type: inferred
    options.aspect_ratio.allowed: verified_live
    options.aspect_ratio.default: unknown
    options.aspect_ratio.allow_infer_from_media: verified_live
    options.multi_shots.type: inferred
    options.multi_shots.default: inferred
    prompt.required: verified_live
    prompt.max_chars: verified_live
    prompt.enhancement_supported: inferred
    prompt.enhancement_default_policy: inferred
    prompt.default_profile_key: inferred
