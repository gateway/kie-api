key: kling-2.6-i2v
label: Kling 2.6 Image to Video
family: market
provider_model: kling-2.6/image-to-video
task_modes:
  - image_to_video
inputs:
  image:
    required_min: 1
    required_max: 1
  video:
    required_min: 0
    required_max: 0
  audio:
    required_min: 0
    required_max: 0
input_constraints:
  image_formats: [jpeg, jpg, png, webp]
  image_max_mb: 10
options:
  sound:
    type: bool
    default: null
    required: true
  duration:
    type: enum
    allowed: [5, 10]
    default: null
    required: true
prompt:
  required: true
  max_chars: 2500
  enhancement_supported: true
  enhancement_default_policy: ask
  default_profile_key: kling_video_v1
defaults: {}
transport:
  endpoint_family: market
  create_path: /api/v1/jobs/createTask
  status_path: /api/v1/jobs/recordInfo
  callback_supported: true
verification:
  verified_from:
    - live_page_model_surface
    - docs_kie_secondary
  verified_on: '2026-03-25'
  verification_notes:
    - Verified model shape from the live https://kie.ai/kling-2-6 page image-to-video surface.
    - The live page exposes prompt, image_urls, sound, and duration as the expected fields for image-to-video.
    - The live page shows a single required image input with JPEG, PNG, and WEBP support up to 10MB.
    - Provider model string remains verified from docs.kie.ai because the live page did not expose the underlying JSON request example directly in this pass.
