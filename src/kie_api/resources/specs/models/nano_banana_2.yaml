key: nano-banana-2
label: Nano Banana 2
family: market
provider_model: nano-banana-2
task_modes:
  - text_to_image
  - image_edit
inputs:
  image:
    required_min: 0
    required_max: 14
  video:
    required_min: 0
    required_max: 0
  audio:
    required_min: 0
    required_max: 0
input_constraints:
  image_formats: [jpeg, png, webp]
  image_max_mb: 30
options:
  aspect_ratio:
    type: enum
    allowed: ['1:1', '1:4', '1:8', '2:3', '3:2', '3:4', '4:1', '4:3', '4:5', '5:4', '8:1', '9:16', '16:9', '21:9', 'auto']
    default: null
  resolution:
    type: enum
    allowed: ['1K', '2K', '4K']
    default: null
  output_format:
    type: enum
    allowed: [jpg, png]
    default: null
prompt:
  required: true
  max_chars: 20000
  enhancement_supported: true
  enhancement_default_policy: ask
  default_profile_keys_by_input_pattern:
    prompt_only: nano_banana_2_text_to_image_v1
    image_edit: nano_banana_2_image_edit_v1
defaults: {}
transport:
  endpoint_family: market
  create_path: /api/v1/jobs/createTask
  status_path: /api/v1/jobs/recordInfo
  callback_supported: true
verification:
  verified_from:
    - live_page_api_surface
    - docs_kie_secondary
  verified_on: '2026-03-25'
  verification_notes:
    - Verified from the live https://kie.ai/nano-banana-2 page API surface.
    - The live page shows required prompt with maxLength 20000 and optional image_input with up to 14 images.
    - The live page supports JPEG, PNG, and WEBP up to 30MB for image_input.
    - The live page exposes aspect_ratio, resolution, and output_format values directly in the expected fields list.
    - The docs endpoint request example uses model string nano-banana-2, which confirms the exact provider model name.
    - Docs examples also include google_search, but the current live page API surface does not expose that field, so it remains intentionally excluded from the runtime abstraction.
  field_provenance:
